<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spartan War Room | Empire Unified</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --text: #ffffff;
            --accent: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --muted: #71717a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            /* Terminal vibe */
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: var(--muted);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-dot.error {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-card {
            background-color: var(--card);
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }

        .metric-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }

        .metric-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .logs-section {
            background-color: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .logs-section h2 {
            font-size: 18px;
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .log-entry {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .log-timestamp {
            color: var(--muted);
            margin-right: 10px;
        }

        .log-msg {
            color: #d4d4d8;
        }

        /* Status Colors */
        .color-new {
            color: var(--text);
        }

        .color-research_done {
            color: var(--warning);
        }

        .color-outreach_sent {
            color: var(--accent);
        }

        .color-nurture_queue {
            color: var(--muted);
        }

        .color-responded {
            color: var(--success);
        }

        #last-updated {
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <h1>Spartan War Room</h1>
            <div id="last-updated">Connecting...</div>
        </div>
        <div>
            <span id="system-status" class="status-dot"></span>
            <span id="status-text">INITIALIZING</span>
        </div>
    </div>

    <!-- METRICS -->
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Total Leads</div>
            <div class="metric-value" id="count-total">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">New (Pending)</div>
            <div class="metric-value color-new" id="count-new">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Research Done</div>
            <div class="metric-value color-research_done" id="count-research">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Outreach Sent</div>
            <div class="metric-value color-outreach_sent" id="count-outreach">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Nurture Queue</div>
            <div class="metric-value color-nurture_queue" id="count-nurture">0</div>
        </div>
    </div>

    <!-- LOGS -->
    <div class="logs-section">
        <h2>Live Brain Logs</h2>
        <div id="logs-container">
            <div class="log-entry">Waiting for feed...</div>
        </div>
    </div>

    <script>
        // CONFIG
        const API_URL = "https://nearmiss1193-afk--ghl-omni-automation-api-dashboard-stats.modal.run";
        const POLL_INTERVAL = 10000; // 10s

        async function fetchStats() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API Failure");
                const data = await response.json();
                render(data);
            } catch (error) {
                console.error(error);
                document.getElementById('status-text').innerText = "DISCONNECTED";
                document.getElementById('system-status').className = "status-dot error";
            }
        }

        function render(data) {
            // Update Status
            document.getElementById('system-status').className = "status-dot active";
            document.getElementById('status-text').innerText = "LIVE";
            document.getElementById('last-updated').innerText = "Last Updated: " + new Date().toLocaleTimeString();

            // Pipeline Stats
            const p = data.pipeline || {};
            const total = Object.values(p).reduce((a, b) => a + b, 0);

            animateValue("count-total", total);
            animateValue("count-new", p['new'] || 0);
            animateValue("count-research", p['research_done'] || 0);
            animateValue("count-outreach", p['outreach_sent'] || 0);
            animateValue("count-nurture", p['nurture_queue'] || 0);

            // Logs
            const logsContainer = document.getElementById('logs-container');
            logsContainer.innerHTML = "";
            (data.recent_logs || []).forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                // Simple timestamp format
                const time = log.timestamp ? log.timestamp.split('T')[1].split('.')[0] : '';
                div.innerHTML = `<span class="log-timestamp">[${time}]</span><span class="log-msg">${log.message}</span>`;
                logsContainer.appendChild(div);
            });
        }

        function animateValue(id, value) {
            const el = document.getElementById(id);
            el.innerText = value; // Simple update for now
        }

        // Init
        fetchStats();
        setInterval(fetchStats, POLL_INTERVAL);
    </script>
</body>

</html>
